plugins {
    id "com.android.application"
}

android {
    namespace "com.gf.erp.tablet"
    compileSdk 35

    defaultConfig {
        applicationId "com.gf.erp.tablet"
        minSdk 16
        targetSdk 23
        versionCode 4
        versionName "0.1.3"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
            debuggable false
        }
    }

    lint {
        checkReleaseBuilds false
        abortOnError false
    }
}
